<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Searchable demo</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<style>
			body {
				padding: 2rem;
				height: 100vh;
			}
			#console {
				color: gray;
			}
			#console .title {
				color: black;
				font-weight: bold;
			}
			#console .year,
			#console .genres,
			#console .cast {
				color: black;
			}
			.controls {
				display: flex;
				align-items: center;
				flex-wrap: wrap;
				gap: 0.25rem 1rem;
			}
			.controls label {
				display: inline-flex;
				align-items: center;
				gap: 0.35rem;
				margin: 0;
			}
			.controls input[type="radio"],
			.controls input[type="checkbox"] {
				margin: 0;
			}
		</style>
	</head>
	<body>
		<div class="d-flex flex-column" style="height: 100%; background: white">
			<h1 class="mb-3"><code>@marianmeres/searchable</code> example</h1>
			<p>
				See
				<a href="https://github.com/marianmeres/searchable">
					https://github.com/marianmeres/searchable
				</a>
				for more info.
			</p>
			<div
				class="form-floating mb-3 p-1 rounded"
				style="background: lightskyblue"
			>
				<input
					type="text"
					class="form-control"
					id="query"
					placeholder="Type your query here..."
					disabled
				/>
				<label for="query">Start typing your query here...</label>
			</div>

			<div class="controls mb-3">
				<span>Search:</span>
				<label>
					<input type="radio" name="strategy" value="exact" />
					<span>exact</span>
				</label>
				<label>
					<input type="radio" name="strategy" value="prefix" checked />
					<span>by prefix</span>
				</label>
				<label>
					<input type="radio" name="strategy" value="fuzzy" />
					<span>fuzzy <small class="text-muted">(max Levenshtein dist. 2)</small></span>
				</label>
				<label>
					<input type="checkbox" id="accent-sensitive" />
					<span>accent-sensitive</span>
				</label>
			</div>

			<div
				class="flex-fill mb-0 font-monospace small"
				id="console"
				style="overflow-y: auto; background: rgb(240, 240, 240); padding: 1rem"
			>
				Please wait...
			</div>
			<p class="small text-muted mt-3 mb-0">
				Dataset from
				<a
					class="text-muted"
					href="https://github.com/bbrumm/databasestar"
					target="_blank"
				>
					databasestar.com</a
				>.
			</p>
		</div>
		<script type="module" src="./dist/app.js"></script>
	</body>
</html>
